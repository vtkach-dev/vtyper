<!DOCTYPE html>
<html lang="en">
<head>
    <title>Typing trainer</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/common/for-flexbox.css">
    <link rel="stylesheet" href="/static/mobile/variables.css">
    <link rel="stylesheet" href="/static/mobile/tabs.css">
    <link rel="stylesheet" href="/static/mobile/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="/static/common/favicon.ico" type="image/x-icon">
    

    <script src="/static/common/translations.js"></script>
    <script src="/static/mobile/layouts.js"></script>
    <script src="/static/mobile/schemes.js" defer></script>
    <script src="/static/mobile/index.js" defer></script>
</head>

<body class="flex dir-col ai-center"> <!-- dir-col jc-center ai-center -->    
    <textarea id="e2focus" style="opacity: 0; position: absolute; left: -10000px;"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
        inputmode="text"
        enterkeyhint="done"
    ></textarea>

    <div id="body-subcontainer" class="flex dir-col jc-spb ai-center">
        <div id="top-container" class="flex jc-spb">
            <div id="fs-container" class="flex jc-spb ai-center">
                <input id="fs-custom-input" type="number" placeholder="Text font size (20px)" max="50" min="12">
                <button id="font-size-custom">Ok</button>
            </div>
        
            <button id="lang-button"><h2>ru</h2></button>
        </div>
    
        <div id="tab-overlay" class="flex jc-center ai-center" style="display: none !important;">
            <div id="tab-content" class="flex jc-center ai-start"></div>
    
            <div id="close-cross-tab" class="close-cross flex jc-center ai-center"></div>
        </div>
    
        <main class="flex dir-col jc-spb ai-center">
            <header class="flex dir-col ai-center">
                <nav id="header-nav" class="flex flex-spb">
                    <button id="words-tab" class="nav-button"></button>
                    <button id="numbers-tab" class="nav-button"></button>
                    <button id="sentences-tab" class="nav-button"></button>
                </nav>
            </header>
    
            <section id="text-wrapper" class="flex jc-center ai-center">
                <div id="text" class="flex flex-wrap-w align-content-fs"></div>
    
                <div id="start-overlay" class="flex jc-center ai-center">
                    <h1 id="start-overlay-text">Click to make the keyboard appear</h1>
                </div>
            </section>
        </main>

    
        <div id="end-overlay" class="flex jc-center ai-center">
            <div id="end-stats" class="flex ai-center jc-center">
                <ul id="stats-field"></ul>
            </div>
    
            <div id="close-cross-end" class="close-cross flex jc-center ai-center"></div>
        </div>
    </div>
   
</body>
</html>
